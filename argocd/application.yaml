apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: devops-final-app
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/johnvictorpereira/Projeto-Final-k8s.git
    targetRevision: HEAD
    path: k8s

  destination:
    server: https://kubernetes.default.svc
    namespace: devops-final

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true