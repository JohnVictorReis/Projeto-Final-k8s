apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: devops-final-ingress
  namespace: devops-final
spec:
  ingressClassName: traefik
  rules:
    - http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: api-service
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 80